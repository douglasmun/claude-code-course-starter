name: Claude PR Review
on: [pull_request]
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Claude Code
        run: curl -fsSL https://claude.ai/install.sh | bash
      - name: Run review
        run: |
          claude -p "Review the diff in this PR for:
          1. Security issues
          2. Missing or broken tests
          3. TypeScript strict mode violations
          4. Violations of CLAUDE.md conventions
          Post findings as a structured checklist." \
          --max-budget-usd 2 \
          --max-turns 10
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
